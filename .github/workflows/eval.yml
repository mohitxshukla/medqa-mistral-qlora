name: lint-and-smoke-eval

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint + smoke deps (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # CPU torch wheel keeps the runner small/fast.
          pip install torch==2.4.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.46.2 peft==0.13.2 datasets==3.1.0 accelerate==1.1.1 sentencepiece==0.2.0 protobuf==5.28.3

      - name: Ruff lint
        run: ruff check src serving app

      - name: Smoke eval (tiny model, tiny data, no full metrics)
        run: python src/evaluate.py --smoke
